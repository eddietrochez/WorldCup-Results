<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quinielas Mundial 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(90deg, #1e40af, #3b82f6);
            border-radius: 12px;
            padding: 1.2rem;
        }
        .table {
            background: rgba(15, 23, 42, 0.95);
        }
        th { 
            background: #1e40af !important;
            position: sticky;
            top: 0;
        }
        .participante-cell {
            font-weight: bold;
            color: #60a5fa;
            background: rgba(30, 64, 175, 0.25);
        }
    </style>
</head>
<body>
    <div class="container py-4">

        <div class="header text-center text-white mb-4">
            <h2><i class="fas fa-trophy"></i> Quinielas Mundial 2026</h2>
            <p class="mb-0">Predicciones del Día</p>
        </div>

        <div class="card p-4 mb-4 bg-dark border-0">
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label fw-bold text-light">Seleccionar Fecha</label>
                    <input type="date" id="fecha" class="form-control form-control-lg">
                </div>
            </div>
        </div>

        <div class="card p-3 bg-dark border-0">
            <div id="loading" class="text-center py-4">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-3">Cargando predicciones...</p>
            </div>
            <div id="tablaContainer"></div>
        </div>

        <div class="text-center mt-4 text-muted small">
            Participantes: <span id="totalParticipantes">0</span>
        </div>
    </div>

    <script>
        async function cargarDatos() {
            const fecha = document.getElementById('fecha').value;
            const loading = document.getElementById('loading');
            const container = document.getElementById('tablaContainer');

            loading.style.display = 'block';
            container.innerHTML = '';

            try {
                const response = await fetch('/obtener_datos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fecha })
                });

                const result = await response.json();
                const datos = result.datos || {};

                document.getElementById('totalParticipantes').textContent = Object.keys(datos).length;
                renderTabla(datos);

            } catch (err) {
                container.innerHTML = `<div class="no-data text-danger">Error al cargar los datos</div>`;
            } finally {
                loading.style.display = 'none';
            }
        }

        function renderTabla(datos) {
            const container = document.getElementById('tablaContainer');
            if (Object.keys(datos).length === 0) {
                container.innerHTML = `<div class="no-data">No hay predicciones para esta fecha</div>`;
                return;
            }

            let html = `
                <div class="table-responsive">
                    <table class="table table-dark table-hover align-middle">
                        <thead>
                            <tr>
                                <th>Participante</th>
                                <th>Encuentro</th>
                                <th>Marcador</th>
                                <th>Resultado</th>
                            </tr>
                        </thead>
                        <tbody>`;

            Object.keys(datos).sort().forEach(participante => {
                const partidos = datos[participante];
                partidos.forEach((p, index) => {
                    html += `<tr>`;
                    if (index === 0) {
                        html += `<td rowspan="${partidos.length}" class="participante-cell">${participante}</td>`;
                    }
                    html += `
                        <td>${p.encuentro}</td>
                        <td class="text-warning fw-bold">${p.marcador}</td>
                        <td>${p.resultado}</td>
                    </tr>`;
                });
            });

            html += `</tbody></table></div>`;
            container.innerHTML = html;
        }

        document.getElementById('fecha').addEventListener('change', cargarDatos);
        
        window.onload = () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('fecha').value = today;
            cargarDatos();
        };
    </script>
</body>
</html>
