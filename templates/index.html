<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quinielas Mundial 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0b1325;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: flex-start; 
            align-items: center;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            padding-top: 10px; 
        }
        .container {
            width: 95%;
            max-width: 1200px;
            background-color: #0b1325;
            padding: 10px;
            box-sizing: border-box;
        }
        
        /* BANNER SUPERIOR */
        .header-banner {
            background-color: #2563eb;
            border-radius: 8px;
            padding: 12px 10px;
            text-align: center;
            margin-bottom: 12px;
        }
        .header-banner h1 {
            margin: 0;
            font-size: 1.9em; 
        }
        .header-banner p {
            margin: 3px 0 0 0;
            font-size: 0.95em;
        }

        /* PANEL DE CONTROL REDISEÑADO (Ultra compacto y discreto) */
        .control-panel {
            background-color: #111827;
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .control-group label {
            font-weight: bold;
            font-size: 0.8em;
            color: #9ca3af;
        }
        .control-group input[type="date"] {
            background-color: #1f2937;
            color: white;
            border: 1px solid #4b5563;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85em;
        }
        
        /* Mini control de fuente */
        .mini-font-control {
            display: flex;
            align-items: center;
            background-color: #1f2937;
            border: 1px solid #4b5563;
            border-radius: 4px;
            overflow: hidden;
        }
        .mini-font-control button {
            background: none;
            color: #9ca3af;
            border: none;
            padding: 4px 8px;
            font-size: 0.85em;
            cursor: pointer;
            font-weight: bold;
        }
        .mini-font-control button:hover {
            background-color: #374151;
            color: white;
        }
        .mini-font-control span {
            font-size: 0.8em;
            font-weight: bold;
            color: white;
            padding: 0 4px;
            min-width: 14px;
            text-align: center;
        }

        /* PESTAÑAS ESTILO COMPACTO */
        .tabs-container {
            display: flex;
            border-bottom: 2px solid #374151;
            margin-bottom: 12px;
        }
        .tab-button {
            background: none;
            border: none;
            color: #9ca3af;
            padding: 8px 16px;
            font-size: 0.95em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tab-button:hover {
            color: #ffffff;
        }
        .tab-button.active {
            color: #2563eb;
            border-bottom: 3px solid #2563eb;
            margin-bottom: -2px;
        }

        /* CONTENEDOR DE TABLA RESPONSIVA */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: 8px;
            background-color: #1f2937;
        }
