<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quinielas Mundial 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0b1325;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: flex-start; 
            align-items: center;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            padding-top: 10px; 
        }
        .container {
            width: 95%;
            max-width: 1200px;
            background-color: #0b1325;
            padding: 10px;
            box-sizing: border-box;
        }
        
        /* BANNER SUPERIOR MÁS COMPACTO */
        .header-banner {
            background-color: #2563eb;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            margin-bottom: 12px;
        }
        .header-banner h1 {
            margin: 0;
            font-size: 1.4em; /* Reducido drásticamente */
        }
        .header-banner p {
            margin: 3px 0 0 0;
            font-size: 0.95em; /* Reducido drásticamente */
        }

        /* PANEL DE CONTROL AJUSTADO PROPORCIONALMENTE */
        .control-panel {
            background-color: #111827;
            border-radius: 8px;
            padding: 10px 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
        }
        .control-group label {
            margin-bottom: 3px;
            font-weight: bold;
            font-size: 0.85em; /* Texto guía más discreto */
        }
        .control-group input[type="date"] {
            background-color: #1f2937;
            color: white;
            border: 1px solid #4b5563;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.9em;
        }
        .btn-group {
            display: flex;
            align-items: center;
            border: 1px solid #4b5563;
            border-radius: 4px;
            overflow: hidden;
        }
        .btn-group button {
            background-color: #1f2937;
            color: white;
            border: none;
            padding: 6px 12px;
            font-size: 1em;
            cursor: pointer;
        }
        .btn-group button:hover {
            background-color: #374151;
        }
        .btn-group span {
            background-color: #111827;
            padding: 6px 12px;
            font-size: 0.95em;
            font-weight: bold;
        }

        /* PESTAÑAS COMPACTAS AL ESTILO DE AYER */
        .tabs-container {
            display: flex;
            border-bottom: 2px solid #374151;
            margin-bottom: 12px;
        }
        .tab-button {
            background: none;
            border: none;
            color: #9ca3af;
            padding: 8px 16px;
            font-size: 0.95em; /* Ajustado para que no domine la vista */
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tab-button:hover {
            color: #ffffff;
        }
        .tab-button.active {
            color: #2563eb;
            border-bottom: 3px solid #2563eb;
            margin-bottom: -2px;
        }

        /* CONTENEDOR DE TABLA RESPONSIVA */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: 8px;
            background-color: #1f2937;
        }

        /* TABLA CON EFECTO AUTOAJUSTAR COMPACTO (Estilo Excel) */
        .tabla-oscura-custom {
            width: 100%;
            border-collapse: collapse;
            table-layout: auto; 
        }
        .tabla-oscura-custom th, .tabla-oscura-custom td {
            padding: 10px 8px; 
            text-align: left;
            box-sizing: border-box;
        }
        
        .col-autoajuste {
            white-space: nowrap; 
            width: 1%; 
        }

        .tabla-oscura-custom th {
            background-color: #2563eb;
            color: white;
            font-size: 1.05em;
        }
        .tabla-oscura-custom td {
            border-bottom: 1px solid #374151;
        }
        .text-marcador {
            color: #ffd700;
            font-weight: bold;
            white-space: nowrap;
        }
        .text-resultado {
            color: #10b981;
            font-weight: bold;
            white-space: nowrap;
        }
        .text-participante {
            font-weight: bold;
            background-color: #161f30;
            white-space: nowrap;
        }
        .icono-reloj {
            color: #ffffff;
            margin-right: 3px;
        }

        /* MEDIA QUERIES PARA REGULAR MÓVILES (FLEXIBILIDAD SIN DEFORMAR) */
        @media (max-width: 768px) {
            .control-panel {
                flex-direction: column;
                align-items: stretch;
                padding: 10px;
                gap: 8px;
            }
            .btn-group button, .btn-group span {
                flex: 1;
                text-align: center;
                padding: 5px;
            }
            .tabs-container {
                gap: 4px;
            }
            .tab-button {
                padding: 8px 4px;
                font-size: 0.85em;
                flex: 1;
                justify-content: center;
            }
            .tabla-oscura-custom th, .tabla-oscura-custom td {
                padding: 6px 5px; 
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-banner">
        <h1><i class="fa-solid fa-trophy"></i> Quinielas Mundial 2026</h1>
        <p id="subtitulo-vista">Predicciones del Día</p>
    </div>

    <div class="control-panel">
        <div class="control-group">
            <label>Seleccionar Fecha</label>
            <input type="date" id="selector-fecha" value="2026-06-18">
        </div>
        <div class="control-group">
            <label>Tamaño Letra</label>
            <div class="btn-group">
                <button onclick="cambiarLetra(-1)">-</button>
                <span id="indicador-letra">10</span> 
                <button onclick="cambiarLetra(1)">+</button>
            </div>
        </div>
    </div>

    <div class="tabs-container">
        <button class="tab-button active" id="tab-amigos" onclick="cambiarPestaña('amigos')">
            <i class="fa-solid fa-users"></i> Amigos
        </button>
        <button class="tab-button" id="tab-oficial" onclick="cambiarPestaña('oficial')">
            <i class="fa-solid fa-earth-americas"></i> Oficiales (FIFA)
        </button>
    </div>

    <div class="table-responsive">
        <table class="tabla-oscura-custom" id="tabla-quinielas">
            <thead>
                <tr>
                    <th class="col-autoajuste">Participante</th>
                    <th class="col-autoajuste">Hora</th>
                    <th>Encuentro</th> 
                    <th class="col-autoajuste">Marcador</th>
                    <th class="col-autoajuste">Resultado</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla">
            </tbody>
        </table>
    </div>
</div>

<script>
    let fontSizeActual = 10; 
    let pestañaActual = 'amigos';

    document.getElementById('selector-fecha').addEventListener('change', cargarDatosSegunVista);

    // Mantenemos tu lógica intacta para no romper la comunicación con Flask
    function cambiarPestaña(tipo) {
        pestañaActual = tipo;
        
        document.getElementById('tab-amigos').classList.remove('active');
        document.getElementById('tab-oficial').classList.remove('active');
        
        if (tipo === 'amigos') {
            document.getElementById('tab-amigos').classList.add('active');
            document.getElementById('subtitulo-vista').innerText = "Predicciones del Día";
        } else {
            document.getElementById('tab-oficial').classList.add('active');
            document.getElementById('subtitulo-vista').innerText = "Resultados Reales Oficiales";
        }
        
        cargarDatosSegunVista();
    }

    function obtenerFechaHoy() {
        const hoy = new Date();
        const yyyy = hoy.getFullYear();
        let mm = hoy.getMonth() + 1; 
        let dd = hoy.getDate();

        if (mm < 10) mm = '0' + mm;
        if (dd < 10) dd = '0' + dd;

        return `${yyyy}-${mm}-${dd}`;
    }

    function cargarDatosSegunVista() {
        const fechaSeleccionada = document.getElementById('selector-fecha').value;
        const fechaHoy = obtenerFechaHoy();

        if (pestañaActual === 'oficial' && fechaSeleccionada === fechaHoy) {
            const tbody = document.getElementById('cuerpo-tabla');
            tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #ffd700; font-weight: bold; padding: 30px; font-size: ${fontSizeActual}px;"><i class="fa-solid fa-hourglass-half"></i> Resultados pendientes</td></tr>`;
            return;
        }

        const urlEndpoint = pestañaActual === 'amigos' ? '/obtener_datos' : '/obtener_datos_oficiales';
        
        fetch(urlEndpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fecha: fechaSeleccionada })
        })
        .then(res => res.json())
        .then(data => {
            renderizarTabla(data.datos || {});
        })
        .catch(err => {
            console.error("Error al cargar datos:", err);
            document.getElementById('cuerpo-tabla').innerHTML = `<tr><td colspan="5" style="text-align: center; color: #ef4444; padding: 20px;">Error al obtener información del servidor.</td></tr>`;
        });
    }

    function renderizarTabla(datos) {
        const tbody = document.getElementById('cuerpo-tabla');
        tbody.innerHTML = '';

        const llavesParticipantes = Object.keys(datos);

        if (llavesParticipantes.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #9ca3af; padding: 30px; font-size: ${fontSizeActual}px;">No hay información registrada para esta fecha.</td></tr>`;
            return;
        }

        llavesParticipantes.forEach(participante => {
            const partidos = datos[participante];
            
            partidos.forEach((partido, index) => {
                const tr = document.createElement('tr');
                tr.style.fontSize = `${fontSizeActual}px`;

                let tdParticipante = '';
                if (index === 0) {
                    tdParticipante = `<td class="text-participante col-autoajuste" rowspan="${partidos.length}">${participante}</td>`;
                }

                let horaMostrar = partido.hora ? partido.hora : `<span style="color:#6b7280; font-size:0.9em;">N/A</span>`;

                tr.innerHTML = `
                    ${tdParticipante}
                    <td class="col-autoajuste"><i class="fa-regular fa-clock icono-reloj"></i> ${horaMostrar}</td>
                    <td style="font-weight: 600;">${partido.encuentro}</td>
                    <td class="text-marcador col-autoajuste">${partido.marcador}</td>
                    <td class="text-resultado col-autoajuste">${partido.resultado}</td>
                `;
                
                tbody.appendChild(tr);
            });
        });
    }

    function cambiarLetra(factor) {
        fontSizeActual += factor;
        if (fontSizeActual < 8) fontSizeActual = 8;
        if (fontSizeActual > 24) fontSizeActual = 24;
        
        document.getElementById('indicador-letra').innerText = fontSizeActual;
        
        const elementos = document.querySelectorAll('#cuerpo-tabla tr, #cuerpo-tabla td');
        elementos.forEach(el => el.style.fontSize = `${fontSizeActual}px`);
    }

    window.onload = () => {
        cambiarLetra(0);
        cargarDatosSegunVista();
    };
</script>

</body>
</html>
