<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quinielas Mundial 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ESTILOS ORIGINALES DE TU APLICACIÓN EN RENDER */
        body {
            background-color: #0b1325;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            width: 95%;
            max-width: 1200px;
            background-color: #0b1325;
            padding: 10px;
            border-radius: 10px;
        }
        .header-banner {
            background-color: #2563eb;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            margin-bottom: 15px;
        }
        .header-banner h1 {
            margin: 0;
            font-size: 1.8em;
        }
        .header-banner p {
            margin: 5px 0 0 0;
            font-size: 1em;
        }
        .control-panel {
            background-color: #111827;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
        }
        .control-group label {
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9em;
        }
        .control-group input[type="date"] {
            background-color: #1f2937;
            color: white;
            border: 1px solid #4b5563;
            padding: 8px;
            border-radius: 5px;
            font-size: 0.9em;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-group {
            display: flex;
            align-items: center;
            border: 1px solid #4b5563;
            border-radius: 5px;
            overflow: hidden;
        }
        .btn-group button {
            background-color: #1f2937;
            color: white;
            border: none;
            padding: 8px 12px;
            font-size: 1em;
            cursor: pointer;
        }
        .btn-group button:hover {
            background-color: #374151;
        }
        .btn-group span {
            background-color: #111827;
            padding: 8px 15px;
            font-size: 1em;
            font-weight: bold;
        }

        /* DISEÑO DE PESTAÑAS RESPONSIVE */
        .tabs-container {
            display: flex;
            border-bottom: 2px solid #374151;
            margin-bottom: 15px;
            gap: 5px;
        }
        .tab-button {
            background: none;
            border: none;
            color: #9ca3af;
            padding: 10px 12px;
            font-size: 0.9em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .tab-button:hover {
            color: #ffffff;
        }
        .tab-button.active {
            color: #2563eb;
            border-bottom: 3px solid #2563eb;
            margin-bottom: -2px;
        }

        /* TABLA AJUSTADA PARA MÓVIL */
        .tabla-oscura-custom {
            width: 100%;
            border-collapse: collapse;
            background-color: #1f2937;
            border-radius: 10px;
            overflow: hidden;
        }
        .tabla-oscura-custom th, .tabla-oscura-custom td {
            padding: 10px 8px;
            text-align: left;
        }
        .tabla-oscura-custom th {
            background-color: #2563eb;
            color: white;
            font-size: 0.95em;
        }
        .tabla-oscura-custom td {
            border-bottom: 1px solid #374151;
        }
        
        /* COLORES ORIGINALES FIJOS */
        .text-marcador {
            color: #ffd700;
            font-weight: bold;
        }
        .text-resultado {
            color: #10b981;
            font-weight: bold;
        }
        .text-participante {
            font-weight: bold;
        }
        .icono-reloj {
            color: #ffffff;
            margin-right: 3px;
        }

        /* MEDIA QUERIES PARA PANTALLAS CHICAS (MÓVIL) */
        @media (max-width: 600px) {
            .header-banner h1 { font-size: 1.4em; }
            .control-panel { padding: 10px; }
            .tab-button { padding: 8px 6px; font-size: 0.8em; gap: 4px; }
            .tabla-oscura-custom th, .tabla-oscura-custom td { padding: 8px 5px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-banner">
        <h1><i class="fa-solid fa-trophy"></i> Quinielas Mundial 2026</h1>
        <p id="subtitulo-vista">Predicciones del Día</p>
    </div>

    <div class="control-panel">
        <div class="control-group" style="flex: 1;">
            <label>Seleccionar Fecha</label>
            <input type="date" id="selector-fecha" value="2026-06-18">
        </div>
        <div class="control-group" style="align-items: flex-end;">
            <label>Tamaño Letra</label>
            <div class="btn-group">
                <button onclick="cambiarLetra(-1)">-</button>
                <span id="indicador-letra">11</span>
                <button onclick="cambiarLetra(1)">+</button>
            </div>
        </div>
    </div>

    <div class="tabs-container">
        <button class="tab-button active" id="tab-amigos" onclick="cambiarPestaña('amigos')">
            <i class="fa-solid fa-users"></i> Amigos
        </button>
        <button class="tab-button" id="tab-oficial" onclick="cambiarPestaña('oficial')">
            <i class="fa-solid fa-earth-americas"></i> Oficiales (FIFA)
        </button>
    </div>

    <table class="tabla-oscura-custom" id="tabla-quinielas">
        <thead>
            <tr>
                <th style="width: 22%;">Part.</th>
                <th style="width: 15%;">Hora</th>
                <th style="width: 33%;">Encuentro</th>
                <th style="width: 15%;">Marc.</th>
                <th style="width: 15%;">Res.</th>
            </tr>
        </thead>
        <tbody id="cuerpo-tabla">
            </tbody>
    </table>
</div>

<script>
    // CAMBIO DE DEFAULT: Iniciamos en 11px para que se adapte perfectamente al móvil
    let fontSizeActual = 11; 
    let pestañaActual = 'amigos';

    document.getElementById('selector-fecha').addEventListener('change', cargarDatosSegunVista);

    function cambiarPestaña(tipo) {
        pestañaActual = tipo;
        
        document.getElementById('tab-amigos').classList.remove('active');
        document.getElementById('tab-oficial').classList.remove('active');
        
        if (tipo === 'amigos') {
            document.getElementById('tab-amigos').classList.add('active');
            document.getElementById('subtitulo-vista').innerText = "Predicciones del Día";
        } else {
            document.getElementById('tab-oficial').classList.add('active');
            document.getElementById('subtitulo-vista').innerText = "Resultados Reales Oficiales";
        }
        
        cargarDatosSegunVista();
    }

    function obtenerFechaHoy() {
        const hoy = new Date();
        const yyyy = hoy.getFullYear();
        let mm = hoy.getMonth() + 1; 
        let dd = hoy.getDate();

        if (mm < 10) mm = '0' + mm;
        if (dd < 10) dd = '0' + dd;

        return `${yyyy}-${mm}-${dd}`;
    }

    function cargarDatosSegunVista() {
        const fechaSeleccionada = document.getElementById('selector-fecha').value;
        const fechaHoy = obtenerFechaHoy();

        if (pestañaActual === 'oficial' && fechaSeleccionada === fechaHoy) {
            const tbody = document.getElementById('cuerpo-tabla');
            tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #ffd700; font-weight: bold; padding: 20px; font-size: ${fontSizeActual}px;"><i class="fa-solid fa-hourglass-half"></i> Resultados pendientes</td></tr>`;
            return;
        }

        const urlEndpoint = pestañaActual === 'amigos' ? '/obtener_datos' : '/obtener_datos_oficiales';
        
        fetch(urlEndpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fecha: fechaSeleccionada })
        })
        .then(res => {
            if (!res.ok) throw new Error("Error en la respuesta del servidor");
            return res.json
