<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quinielas Mundial 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0b1325;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: flex-start; 
            align-items: center;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            padding-top: 10px; 
        }
        .container {
            width: 95%;
            max-width: 1200px;
            background-color: #0b1325;
            padding: 10px;
            box-sizing: border-box;
        }
        
        /* BANNER SUPERIOR */
        .header-banner {
            background-color: #2563eb;
            border-radius: 8px;
            padding: 12px 10px;
            text-align: center;
            margin-bottom: 12px;
        }
        .header-banner h1 {
            margin: 0;
            font-size: 1.9em; 
        }
        .header-banner p {
            margin: 3px 0 0 0;
            font-size: 0.95em;
        }

        /* PANEL DE CONTROL */
        .control-panel {
            background-color: #111827;
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .control-group label {
            font-weight: bold;
            font-size: 0.8em;
            color: #9ca3af;
        }
        .control-group input[type="date"] {
            background-color: #1f2937;
            color: white;
            border: 1px solid #4b5563;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85em;
        }
        .control-group input[type="date"]:disabled {
            background-color: #374151;
            color: #9ca3af;
            cursor: not-allowed;
            border-color: #1f2937;
        }
        
        /* Mini control de fuente */
        .mini-font-control {
            display: flex;
            align-items: center;
            background-color: #1f2937;
            border: 1px solid #4b5563;
            border-radius: 4px;
            overflow: hidden;
        }
        .mini-font-control button {
            background: none;
            color: #9ca3af;
            border: none;
            padding: 4px 8px;
            font-size: 0.85em;
            cursor: pointer;
            font-weight: bold;
        }
        .mini-font-control button:hover:not(:disabled) {
            background-color: #374151;
            color: white;
        }
        .mini-font-control span {
            font-size: 0.8em;
            font-weight: bold;
            color: white;
            padding: 0 4px;
            min-width: 14px;
            text-align: center;
        }

        /* PESTAÑAS ESTILO COMPACTO */
        .tabs-container {
            display: flex;
            border-bottom: 2px solid #374151;
            margin-bottom: 12px;
        }
        .tab-button {
            background: none;
            border: none;
            color: #9ca3af;
            padding: 8px 12px;
            font-size: 0.65em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            justify-content: center;
        }
        .tab-button:hover {
            color: #ffffff;
        }
        .tab-button.active {
            color: #2563eb;
            border-bottom: 3px solid #2563eb;
            margin-bottom: -2px;
        }

        /* CONTENEDOR DE TABLA RESPONSIVA */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: 8px;
            background-color: #1f2937;
        }

        /* TABLA MODO EXCEL */
        .tabla-oscura-custom {
            width: 100%;
            border-collapse: collapse;
            table-layout: auto; 
        }
        .tabla-oscura-custom th, .tabla-oscura-custom td {
            padding: 10px 8px; 
            text-align: left;
            box-sizing: border-box;
        }
        
        .col-autoajuste {
            white-space: nowrap; 
            width: 1%; 
        }

        /* Ajustar texto para la columna Participante */
        .col-ajustar-texto {
            white-space: normal !important; 
            word-wrap: break-word;
            max-width: 85px; 
        }

        /* Estilos específicos para la alineación compacta de estadísticas */
        .text-centro {
            text-align: center !important;
        }
        .text-pts {
            color: #ffd700;
            font-weight: bold;
            text-align: center !important;
        }

        .tabla-oscura-custom th {
            background-color: #2563eb;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .tabla-oscura-custom td {
            border-bottom: 1px solid #374151;
        }
        .text-marcador {
            color: #ffd700;
            font-weight: bold;
            white-space: nowrap;
        }
        .text-resultado {
            color: #10b981;
            font-weight: bold;
            white-space: nowrap;
        }
        .text-participante {
            font-weight: bold;
            background-color: #161f30;
        }
        .icono-reloj {
            color: #ffffff;
            margin-right: 3px;
        }

        @media (max-width: 768px) {
            .tab-button {
                padding: 8px 4px;
                font-size: 0.5em;
                gap: 4px;
            }
            .tabla-oscura-custom th, .tabla-oscura-custom td {
                padding: 6px 5px; 
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-banner">
        <h1><i class="fa-solid fa-trophy"></i> Quinielas Mundial 2026</h1>
        <p id="subtitulo-vista">Predicciones del Día</p>
    </div>

    <div class="control-panel">
        <div class="control-group">
            <label><i class="fa-solid fa-calendar-days"></i></label>
            <input type="date" id="selector-fecha" value="2026-06-18">
        </div>
        <div class="control-group">
            <label><i class="fa-solid fa-text-height"></i></label>
            <div class="mini-font-control">
                <button onclick="cambiarLetra(-1)">-</button>
                <span id="indicador-letra">9</span>
                <button onclick="cambiarLetra(1)">+</button>
            </div>
        </div>
    </div>

    <div class="tabs-container">
        <button class="tab-button active" id="tab-predicciones" onclick="cambiarPestaña('predicciones')">
            <i class="fa-solid fa-users"></i> Predicciones
        </button>
        <button class="tab-button" id="tab-oficial" onclick="cambiarPestaña('oficial')">
            <i class="fa-solid fa-earth-americas"></i> Oficiales (FIFA)
        </button>
        <button class="tab-button" id="tab-posiciones" onclick="cambiarPestaña('posiciones')">
            <i class="fa-solid fa-ranking-star"></i> Posiciones
        </button>
    </div>

    <div class="table-responsive">
        <table class="tabla-oscura-custom" id="tabla-quinielas">
            <thead id="encabezado-tabla">
                </thead>
            <tbody id="cuerpo-tabla">
                </tbody>
        </table>
    </div>
</div>

<script>
    let fontSizeActual = 9; 
    let pestañaActual = 'predicciones';

    document.getElementById('selector-fecha').addEventListener('change', cargarDatosSegunVista);

    function cambiarPestaña(tipo) {
        pestañaActual = tipo;
        
        document.getElementById('tab-predicciones').classList.remove('active');
        document.getElementById('tab-oficial').classList.remove('active');
        document.getElementById('tab-posiciones').classList.remove('active');
        
        const selectorFecha = document.getElementById('selector-fecha');

        if (tipo === 'predicciones') {
            document.getElementById('tab-predicciones').classList.add('active');
            document.getElementById('subtitulo-vista').innerText = "Predicciones del Día";
            selectorFecha.disabled = false;
            cargarDatosSegunVista();
        } else if (tipo === 'oficial') {
            document.getElementById('tab-oficial').classList.add('active');
            document.getElementById('subtitulo-vista').innerText = "Resultados Reales Oficiales";
            selectorFecha.disabled = false;
            cargarDatosSegunVista();
        } else if (tipo === 'posiciones') {
            document.getElementById('tab-posiciones').classList.add('active');
            document.getElementById('subtitulo-vista').innerText = "Tabla General de Posiciones";
            selectorFecha.disabled = true;
            cargarTablaPosiciones();
        }
    }

    function obtenerFechaHoy() {
        const hoy = new Date();
        const yyyy = hoy.getFullYear();
        let mm = hoy.getMonth() + 1; 
        let dd = hoy.getDate();

        if (mm < 10) mm = '0' + mm;
        if (dd < 10) dd = '0' + dd;

        return `${yyyy}-${mm}-${dd}`;
    }

    function armarEncabezadoJornadas() {
        const thead = document.getElementById('encabezado-tabla');
        thead.innerHTML = `
            <tr>
                <th class="col-ajustar-texto">Participante</th>
                <th class="col-autoajuste">Hora</th>
                <th>Encuentro</th> 
                <th class="col-autoajuste">Marcador</th>
                <th class="col-autoajuste">Resultado</th>
            </tr>
        `;
    }

    function cargarDatosSegunVista() {
        const fechaSeleccionada = document.getElementById('selector-fecha').value;
        const fechaHoy = obtenerFechaHoy();

        // Aseguramos que los encabezados correspondan a jornadas
        armarEncabezadoJornadas();

        if (pestañaActual === 'oficial' && fechaSeleccionada === fechaHoy) {
            const tbody = document.getElementById('cuerpo-tabla');
            tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #ffd700; font-weight: bold; padding: 30px; font-size: ${fontSizeActual}px;"><i class="fa-solid fa-hourglass-half"></i> Resultados pendientes</td></tr>`;
            ajustarEstilosFuentes(); 
            return;
        }

        const urlEndpoint = pestañaActual === 'predicciones' ? '/obtener_datos' : '/obtener_datos_oficiales';
        
        fetch(urlEndpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fecha: fechaSeleccionada })
        })
        .then(res => res.json())
        .then(data => {
            renderizarTablaPartidos(data.datos || {});
        })
        .catch(err => {
            console.error("Error al cargar encuentros:", err);
            document.getElementById('cuerpo-tabla').innerHTML = `<tr><td colspan="5" style="text-align: center; color: #ef4444; padding: 20px;">Error al obtener información del servidor.</td></tr>`;
            ajustarEstilosFuentes();
        });
    }

    function renderizarTablaPartidos(datos) {
        const tbody = document.getElementById('cuerpo-tabla');
        tbody.innerHTML = '';

        const llavesParticipantes = Object.keys(datos);

        if (llavesParticipantes.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #9ca3af; padding: 30px; font-size: ${fontSizeActual}px;">No hay información registrada para esta fecha.</td></tr>`;
            ajustarEstilosFuentes();
            return;
        }

        llavesParticipantes.forEach(participante => {
            let partidos = datos[participante];
            
            partidos.sort((a, b) => {
                let horaA = a.hora ? a.hora.trim() : "23:59";
                let horaB = b.hora ? b.hora.trim() : "23:59";
                return horaA.localeCompare(horaB);
            });
            
            partidos.forEach((partido, index) => {
                const tr = document.createElement('tr');

                let tdParticipante = '';
                if (index === 0) {
                    tdParticipante = `<td class="text-participante col-ajustar-texto" rowspan="${partidos.length}">${participante}</td>`;
                }

                let horaMostrar = partido.hora ? partido.hora : `<span style="color:#6b7280; font-size:0.9em;">N/A</span>`;

                tr.innerHTML = `
                    ${tdParticipante}
                    <td class="col-autoajuste"><i class="fa-regular fa-clock icono-reloj"></i> ${horaMostrar}</td>
                    <td style="font-weight: 600;">${partido.encuentro}</td>
                    <td class="text-marcador col-autoajuste">${partido.marcador}</td>
                    <td class="text-resultado col-autoajuste">${partido.resultado}</td>
                `;
                
                tbody.appendChild(tr);
            });
        });
        
        ajustarEstilosFuentes();
    }

    function cargarTablaPosiciones() {
        const thead = document.getElementById('encabezado-tabla');
        thead.innerHTML = `
            <tr>
                <th class="col-autoajuste text-centro">Pos</th>
                <th class="col-ajustar-texto">Participante</th>
                <th class="col-autoajuste text-centro">PJ</th>
                <th class="col-autoajuste text-centro" title="Marcadores Exactos (3 pts)">MA</th>
                <th class="col-autoajuste text-centro" title="Ganador/Empate Acertado (2 pts)">RA</th>
                <th class="col-autoajuste text-centro" title="Fallados (0 pts)">P</th>
                <th class="col-autoajuste text-centro">Pts</th>
            </tr>
        `;

        fetch('/obtener_posiciones')
        .then(res => res.json())
        .then(data => {
            const tbody = document.getElementById('cuerpo-tabla');
            tbody.innerHTML = '';

            const posiciones = data.posiciones || [];

            if (posiciones.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: #9ca3af; padding: 30px;">Aún no hay partidos oficiales finalizados para calcular posiciones.</td></tr>`;
                ajustarEstilosFuentes();
                return;
            }

            posiciones.forEach((row, index) => {
                const tr = document.createElement('tr');
                let posStyle = (index === 0) ? 'font-weight: bold; color: #ffd700;' : 'font-weight: bold; color: #9ca3af;';

                tr.innerHTML = `
                    <td class="col-autoajuste text-centro" style="${posStyle}">${index + 1}</td>
                    <td class="text-participante col-ajustar-texto">${row.participante}</td>
                    <td class="col-autoajuste text-centro">${row.pj}</td>
                    <td class="col-autoajuste text-centro" style="color: #34d399; font-weight: 500;">${row.g}</td>
                    <td class="col-autoajuste text-centro" style="color: #60a5fa;">${row.e}</td>
                    <td class="col-autoajuste text-centro" style="color: #f87171;">${row.p}</td>
                    <td class="col-autoajuste text-pts">${row.pts}</td>
                `;
                tbody.appendChild(tr);
            });

            ajustarEstilosFuentes();
        })
        .catch(err => {
            console.error("Error al cargar tabla de posiciones:", err);
            document.getElementById('cuerpo-tabla').innerHTML = `<tr><td colspan="7" style="text-align: center; color: #ef4444; padding: 20px;">Error al calcular el ranking en el servidor.</td></tr>`;
            ajustarEstilosFuentes();
        });
    }

    function cambiarLetra(factor) {
        fontSizeActual += factor;
        if (fontSizeActual < 6) fontSizeActual = 6;
        if (fontSizeActual > 24) fontSizeActual = 24;
        
        document.getElementById('indicador-letra').innerText = fontSizeActual;
        ajustarEstilosFuentes();
    }

    function ajustarEstilosFuentes() {
        const elementos = document.querySelectorAll('#cuerpo-tabla tr, #cuerpo-tabla td, .tabla-oscura-custom th');
        if (elementos && elementos.length > 0) {
            elementos.forEach(el => {
                el.style.setProperty('font-size', `${fontSizeActual}px`, 'important');
            });
        }
    }

    window.onload = () => {
        // 1. Armamos la estructura inicial del encabezado
        armarEncabezadoJornadas();
        // 2. Inicializamos el indicador visual de la fuente
        cambiarLetra(0);
        // 3. Traemos los datos de la jornada seleccionada
        cargarDatosSegunVista();
    };
</script>

</body>
</html>
