<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quinielas Mundial 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0b1325;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: flex-start; 
            align-items: center;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            padding-top: 20px; 
        }
        .container {
            width: 95%; /* Aumentado ligeramente para aprovechar mejor el espacio lateral */
            max-width: 1200px;
            background-color: #0b1325;
            padding: 20px;
            border-radius: 10px;
            box-sizing: border-box;
        }
        .header-banner {
            background-color: #2563eb;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .header-banner h1 {
            margin: 0;
            font-size: 2.5em;
        }
        .header-banner p {
            margin: 5px 0 0 0;
            font-size: 1.2em;
        }
        .control-panel {
            background-color: #111827;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
        }
        .control-group label {
            margin-bottom: 5px;
            font-weight: bold;
        }
        .control-group input[type="date"] {
            background-color: #1f2937;
            color: white;
            border: 1px solid #4b5563;
            padding: 10px;
            border-radius: 5px;
            font-size: 1em;
        }
        .btn-group {
            display: flex;
            align-items: center;
            border: 1px solid #4b5563;
            border-radius: 5px;
            overflow: hidden;
        }
        .btn-group button {
            background-color: #1f2937;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 1.2em;
            cursor: pointer;
        }
        .btn-group button:hover {
            background-color: #374151;
        }
        .btn-group span {
            background-color: #111827;
            padding: 10px 20px;
            font-size: 1.2em;
            font-weight: bold;
        }

        /* DISEÑO DE PESTAÑAS */
        .tabs-container {
            display: flex;
            border-bottom: 2px solid #374151;
            margin-bottom: 20px;
        }
        .tab-button {
            background: none;
            border: none;
            color: #9ca3af;
            padding: 12px 24px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tab-button:hover {
            color: #ffffff;
        }
        .tab-button.active {
            color: #2563eb;
            border-bottom: 3px solid #2563eb;
            margin-bottom: -2px;
        }

        /* CONTENEDOR RESPONSIVO PARA LA TABLA */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch; /* Scroll suave en iOS */
            border-radius: 10px;
            background-color: #1f2937;
        }

        /* TABLA ORIGINAL INTACTA */
        .tabla-oscura-custom {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px; /* Evita que las columnas se compriman demasiado en móvil */
        }
        .tabla-oscura-custom th, .tabla-oscura-custom td {
            padding: 15px;
            text-align: left;
        }
        .tabla-oscura-custom th {
            background-color: #2563eb;
            color: white;
            font-size: 1.1em;
        }
        .tabla-oscura-custom td {
            border-bottom: 1px solid #374151;
            font-size: 1em;
        }
        .text-marcador {
            color: #ffd700;
            font-weight: bold;
        }
        .text-resultado {
            color: #10b981;
            font-weight: bold;
        }
        .text-participante {
            font-weight: bold;
        }
        .icono-reloj {
            color: #ffffff;
            margin-right: 5px;
        }

        /* --- NUEVOS AJUSTES ESPECIALES PARA MÓVILES --- */
        @media (max-width: 768px) {
            body {
                padding-top: 10px;
            }
            .container {
                width: 100%;
                padding: 10px;
            }
            .header-banner {
                padding: 15px 10px;
                margin-bottom: 15px;
            }
            .header-banner h1 {
                font-size: 1.8em;
            }
            .header-banner p {
                font-size: 1em;
            }
            .control-panel {
                flex-direction: column;
                align-items: stretch;
                padding: 15px;
                gap: 15px;
            }
            .control-group style {
                align-items: stretch;
            }
            .control-group input[type="date"] {
                padding: 8px;
            }
            .btn-group button {
                padding: 8px 12px;
            }
            .btn-group span {
                padding: 8px 15px;
            }
            .tabs-container {
                gap: 5px;
            }
            .tab-button {
                padding: 10px 8px;
                font-size: 0.9em;
                flex: 1;
                justify-content: center;
                text-align: center;
            }
            .tabla-oscura-custom th, .tabla-oscura-custom td {
                padding: 10px; /* Reducción de espaciados internos en celdas */
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-banner">
        <h1>
